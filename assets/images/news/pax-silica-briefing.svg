<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Pax Silica semiconductor supply chain editorial graphic</title>
  <desc id="desc">A deep purple editorial graphic with a silicon chip and linked supply-chain nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="1" x2="1" y2="0"><stop stop-color="#12051c"/><stop offset=".55" stop-color="#32124a"/><stop offset="1" stop-color="#133b4a"/></linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#b26ed0"/><stop offset="1" stop-color="#4eb8bd"/></linearGradient>
  </defs>
  <rect width="1200" height="630" rx="34" fill="url(#bg)"/>
  <g opacity=".5" stroke="#8ad5d4" stroke-width="3">
    <path d="M780 145 930 235 1082 165M930 235l-90 160m90-160 110 185M840 395l200 25"/>
    <circle cx="780" cy="145" r="19" fill="#8ad5d4"/><circle cx="1082" cy="165" r="19" fill="#8ad5d4"/><circle cx="840" cy="395" r="19" fill="#8ad5d4"/><circle cx="1040" cy="420" r="19" fill="#8ad5d4"/>
  </g>
  <g transform="translate(836 195)">
    <rect width="190" height="190" rx="28" fill="#1c0a2b" stroke="url(#chip)" stroke-width="10"/>
    <rect x="43" y="43" width="104" height="104" rx="15" fill="url(#chip)" opacity=".88"/>
    <g stroke="#9edbdd" stroke-width="8"><path d="M26 0v-28M70 0v-28M114 0v-28M158 0v-28M190 26h28M190 70h28M190 114h28M190 158h28M26 190v28M70 190v28M114 190v28M158 190v28M0 26h-28M0 70h-28M0 114h-28M0 158h-28"/></g>
  </g>
  <text x="78" y="96" fill="#8ad5d4" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="5">FMB NEWS · TECHNOLOGY</text>
  <text x="78" y="226" fill="#fff" font-family="Georgia, serif" font-size="78" font-weight="700">Pax Silica,</text>
  <text x="78" y="311" fill="#fff" font-family="Georgia, serif" font-size="78" font-weight="700">without the</text>
  <text x="78" y="396" fill="#fff" font-family="Georgia, serif" font-size="78" font-weight="700">jargon.</text>
  <text x="80" y="457" fill="#d7eef0" font-family="Arial, sans-serif" font-size="24">Chips, supply chains, skills, and power.</text>
  <line x1="80" y1="504" x2="620" y2="504" stroke="#fff" stroke-opacity=".25"/>
  <text x="80" y="548" fill="#fff" font-family="Arial, sans-serif" font-size="22" font-weight="700">WITH LOVE, FMB</text>
</svg>
