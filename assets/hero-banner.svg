<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 619" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style>
      @keyframes slideLoop {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-1100px);
        }
      }
      
      @keyframes slideInFromLeft {
        0% {
          transform: translateX(-1100px);
        }
        100% {
          transform: translateX(0);
        }
      }
      
      .banner-container {
        animation: slideInFromLeft 0.8s ease-out forwards;
      }
      
      .fmb-text {
        animation: slideLoop 6s linear infinite;
        animation-delay: 1s;
        transform-origin: left center;
      }
      
      .banner-item {
        opacity: 0;
      }
      
      .banner-item:nth-child(1) {
        animation: fadeIn 0.5s ease-out forwards;
        animation-delay: 0s;
      }
      
      .banner-item:nth-child(2) {
        animation: fadeIn 0.5s ease-out forwards;
        animation-delay: 0.15s;
      }
      
      .banner-item:nth-child(3) {
        animation: fadeIn 0.5s ease-out forwards;
        animation-delay: 0.3s;
      }
      
      .banner-item:nth-child(4) {
        animation: fadeIn 0.5s ease-out forwards;
        animation-delay: 0.45s;
      }
      
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </defs>
  
  <title id="title">With love, FMB - Animated Hero Banner</title>
  <desc id="desc">Animated banner with continuous looping text.</desc>
  
  <g class="banner-container">
    <!-- Background -->
    <rect width="1100" height="619" fill="#ffffff"/>
    
    <!-- Banner Images -->
    <image class="banner-item" href="hero-1.svg" x="0" y="0" width="275" height="619"/>
    <image class="banner-item" href="hero-2.svg" x="275" y="0" width="275" height="619"/>
    <image class="banner-item" href="hero-3.svg" x="550" y="0" width="275" height="619"/>
    <image class="banner-item" href="hero-4.svg" x="825" y="0" width="275" height="619"/>
  </g>
  
  <!-- Looping FMB Text that moves continuously -->
  <g class="fmb-text">
    <text x="50" y="580" font-family="cursive" font-size="32" font-weight="bold" fill="#7B2CBF">
      With love, FMB
    </text>
    <!-- Duplicate text for seamless loop -->
    <text x="1150" y="580" font-family="cursive" font-size="32" font-weight="bold" fill="#7B2CBF">
      With love, FMB
    </text>
  </g>
</svg>