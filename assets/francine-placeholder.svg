<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-labelledby="title desc">
  <title id="title">FMB portrait placeholder</title>
  <desc id="desc">A purple and gold branded placeholder to be replaced with Francine Marie Bautista's official portrait.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b99ad8"/>
      <stop offset="0.5" stop-color="#6c3f93"/>
      <stop offset="1" stop-color="#251136"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="35%" r="62%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".32"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#light)"/>
  <circle cx="400" cy="380" r="152" fill="#ffffff" fill-opacity=".12" stroke="#d7bd83" stroke-width="2"/>
  <path d="M180 930c18-184 104-302 220-302s202 118 220 302" fill="#ffffff" fill-opacity=".1" stroke="#d7bd83" stroke-width="2"/>
  <circle cx="400" cy="380" r="110" fill="#ffffff" fill-opacity=".12"/>
  <text x="400" y="470" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="112" font-style="italic" font-weight="700">FMB</text>
  <text x="400" y="540" text-anchor="middle" fill="#ead8b2" font-family="Arial, sans-serif" font-size="20" letter-spacing="7">OFFICIAL PORTRAIT</text>
  <text x="400" y="570" text-anchor="middle" fill="#ffffff" fill-opacity=".7" font-family="Arial, sans-serif" font-size="16" letter-spacing="3">TO BE ADDED</text>
  <circle cx="150" cy="160" r="70" fill="none" stroke="#d7bd83" stroke-opacity=".45"/>
  <circle cx="680" cy="760" r="115" fill="none" stroke="#ffffff" stroke-opacity=".12"/>
</svg>
