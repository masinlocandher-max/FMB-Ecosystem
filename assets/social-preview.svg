<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">With Love, FMB</title>
  <desc id="desc">Social sharing preview for the official website of Francine Marie Bautista.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f4edf9"/>
      <stop offset="1" stop-color="#d8c4ea"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6c3f93" stop-opacity=".35"/>
      <stop offset="1" stop-color="#6c3f93" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="960" cy="315" r="260" fill="url(#orb)"/>
  <circle cx="980" cy="315" r="210" fill="none" stroke="#b99551" stroke-opacity=".5" stroke-width="2"/>
  <text x="90" y="215" fill="#4b2673" font-family="Georgia,serif" font-size="40" font-style="italic">with love,</text>
  <text x="82" y="370" fill="#251136" font-family="Georgia,serif" font-size="180" font-style="italic" font-weight="700" letter-spacing="-12">fmb</text>
  <text x="92" y="455" fill="#4b2673" font-family="Arial,sans-serif" font-size="24" font-weight="700" letter-spacing="6">FRANCINE MARIE BAUTISTA</text>
  <text x="92" y="505" fill="#554b5d" font-family="Arial,sans-serif" font-size="22">Founder · Author · Speaker · Brand Strategist</text>
  <circle cx="980" cy="315" r="118" fill="#251136"/>
  <text x="980" y="350" text-anchor="middle" fill="#ffffff" font-family="Georgia,serif" font-size="90" font-style="italic" font-weight="700">FMB</text>
</svg>
