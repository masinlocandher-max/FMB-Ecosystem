name: Quality diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  capture-quality-output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture quality checker output
        shell: bash
        run: |
          set +e
          python3 scripts/quality_check.py > quality-check-output.txt 2>&1
          status=$?
          echo "$status" > quality-check-exit-code.txt
          exit 0
      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: quality-check-diagnostic
          path: |
            quality-check-output.txt
            quality-check-exit-code.txt
          if-no-files-found: error
