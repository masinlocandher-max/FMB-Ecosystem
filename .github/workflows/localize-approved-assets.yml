name: Localize approved brand images

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/localize-approved-assets.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/localize-approved-assets.yml'
      - '.github/localize-assets-trigger.txt'

permissions:
  contents: write

jobs:
  localize-assets:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}

      - name: Download approved image files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/images .asset-downloads

          curl --fail --location --retry 3 --retry-delay 2 \
            --output .asset-downloads/hero.webp \
            'https://at.adobe.com/bR7p2EcmULhYtsjS'
          curl --fail --location --retry 3 --retry-delay 2 \
            --output .asset-downloads/founder.webp \
            'https://at.adobe.com/o7JynBYGwNMz19hL'
          curl --fail --location --retry 3 --retry-delay 2 \
            --output .asset-downloads/icon-transparent.png \
            'https://at.adobe.com/bHVoeu6xVUoGznEx'
          curl --fail --location --retry 3 --retry-delay 2 \
            --output .asset-downloads/signature-transparent.png \
            'https://at.adobe.com/4x2CSm9W5rRnDhaf'

          file .asset-downloads/*
          printf '%s  %s\n' \
            '0971e8e6b1bc4c11254c7fd99a370e42fea64ede629279f8320355ce317b413a' '.asset-downloads/hero.webp' \
            'cd41d7a47590d93171628ac99a7c50ae6776b83fcf64a46a25f9ecb15d90c6de' '.asset-downloads/founder.webp' \
            '02fbb0926e9b354c92d1ce71d80333455a964fa236f3203963e96aa12ddc3a0b' '.asset-downloads/icon-transparent.png' \
            '404673a36a6adc1926af9e5a3bddf3b373454dc2a5f03f1de8b87290f7288ff5' '.asset-downloads/signature-transparent.png' \
            > .asset-downloads/SHA256SUMS
          sha256sum --check .asset-downloads/SHA256SUMS

          mv .asset-downloads/hero.webp assets/images/hero.webp
          mv .asset-downloads/founder.webp assets/images/founder.webp
          mv .asset-downloads/icon-transparent.png assets/images/icon-transparent.png
          mv .asset-downloads/signature-transparent.png assets/images/signature-transparent.png
          rm -rf .asset-downloads

      - name: Replace fragile remote image wrappers
        shell: python
        run: |
          from pathlib import Path
          import json

          root = Path('.')
          replacements = {
              'assets/hero-banner.svg': 'assets/images/hero.webp',
              'assets/founder.svg': 'assets/images/founder.webp',
              'assets/icon.svg': 'assets/images/icon-transparent.png',
              'assets/signature.svg': 'assets/images/signature-transparent.png',
          }
          text_suffixes = {'.html', '.css', '.js', '.json', '.webmanifest', '.xml', '.md', '.txt', '.yml', '.yaml'}
          skipped = {Path('.github/workflows/localize-approved-assets.yml')}

          for path in root.rglob('*'):
              if not path.is_file() or path in skipped or '.git' in path.parts:
                  continue
              if path.suffix.lower() not in text_suffixes:
                  continue
              try:
                  original = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              updated = original
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != original:
                  path.write_text(updated, encoding='utf-8')

          manifest_path = Path('manifest.webmanifest')
          if manifest_path.exists():
              manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
              manifest['icons'] = [{
                  'src': 'assets/images/icon-transparent.png',
                  'sizes': '803x745',
                  'type': 'image/png',
                  'purpose': 'any'
              }]
              manifest_path.write_text(json.dumps(manifest, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')

          sw_path = Path('service-worker.js')
          if sw_path.exists():
              sw = sw_path.read_text(encoding='utf-8')
              sw = sw.replace("const CACHE_NAME='with-love-fmb-v2';", "const CACHE_NAME='with-love-fmb-v3';")
              sw_path.write_text(sw, encoding='utf-8')

          for obsolete in [
              Path('assets/hero-banner.svg'),
              Path('assets/founder.svg'),
              Path('assets/icon.svg'),
              Path('assets/signature.svg'),
          ]:
              obsolete.unlink(missing_ok=True)

      - name: Verify local image references
        shell: bash
        run: |
          set -euo pipefail
          test -s assets/images/hero.webp
          test -s assets/images/founder.webp
          test -s assets/images/icon-transparent.png
          test -s assets/images/signature-transparent.png
          ! grep -R --line-number --fixed-strings 'assets/hero-banner.svg' --exclude='localize-approved-assets.yml' .
          ! grep -R --line-number --fixed-strings 'assets/founder.svg' --exclude='localize-approved-assets.yml' .
          ! grep -R --line-number --fixed-strings 'assets/icon.svg' --exclude='localize-approved-assets.yml' .
          ! grep -R --line-number --fixed-strings 'assets/signature.svg' --exclude='localize-approved-assets.yml' .
          ! grep -R --line-number --fixed-strings 'at.adobe.com' --exclude='localize-approved-assets.yml' .
          python scripts/quality_check.py
          find . -type f -name '*.js' -not -path './.git/*' -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done

      - name: Commit repaired assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No asset changes were needed.'
            exit 0
          fi
          git commit -m 'Store approved website images locally'
          git push origin HEAD:"$TARGET_BRANCH"
