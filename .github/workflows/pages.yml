name: Publish With love, FMB

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare the current website
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          cp -- *.html _site/
          cp CNAME manifest.webmanifest service-worker.js robots.txt sitemap.xml _site/
          cp -R assets _site/assets
          cp -R mabayani _site/mabayani
          touch _site/.nojekyll

          test "$(cat _site/CNAME)" = "www.francinemariebautista.com"
          test -f _site/assets/icon.svg
          test -f _site/assets/signature.svg
          test -f _site/assets/founder.svg
          test -f _site/assets/hero-banner.svg
          test -f _site/assets/css/site.css
          test -f _site/assets/css/readings.css
          test -f _site/assets/js/auth.js
          test -f _site/assets/js/member.js
          test -f _site/assets/js/music.js
          test -f _site/assets/data/music-library.json
          test -f _site/manifest.webmanifest
          test -f _site/service-worker.js
          test -f _site/admin.html
          test -f _site/reset-password.html
          test -f _site/community-guidelines.html
          test -f _site/assets/images/app-icon-192.png
          test -f _site/assets/images/app-icon-512.png
          grep -q 'Sign in' _site/index.html
          grep -q 'Create profile' _site/auth.html
          grep -q 'For Anxious Moments' _site/music.html
          grep -q 'Cultural Historian' _site/about.html
          grep -q 'Privacy Policy' _site/privacy-policy.html
          grep -q 'Your Body Is Worth Listening To' _site/womens-health.html
          grep -q 'Skin Care and Makeup Without the Pressure' _site/skin-care-makeup.html
          grep -q 'Coming Out, Being Known, and Learning to Respect' _site/coming-out-respect.html
          grep -q 'Men Can Cry' _site/men-can-cry.html
          grep -q 'With love, FMB' _site/womens-health.html
          grep -q 'With love, FMB' _site/skin-care-makeup.html
          grep -q 'With love, FMB' _site/coming-out-respect.html
          grep -q 'With love, FMB' _site/men-can-cry.html

      - name: Publish directly to gh-pages
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd _site
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Publish current With love, FMB website"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
