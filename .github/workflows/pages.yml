name: Publish With love, FMB

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare the current website
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          cp -- *.html _site/
          cp CNAME manifest.webmanifest service-worker.js robots.txt sitemap.xml _redirects _site/
          cp -R assets _site/assets
          cp -R mabayani _site/mabayani
          cp -R app ebooks music communityengagements aboutfmb 'fmb&co' fmbandco gethelp news profile _site/
          touch _site/.nojekyll

          test "$(cat _site/CNAME)" = "www.francinemariebautista.com"
          test -f _site/assets/icon.svg
          test -f _site/assets/signature.svg
          test -f _site/assets/founder.svg
          test -f _site/assets/hero-banner.svg
          test -f _site/assets/css/site.css
          test -f _site/assets/css/readings.css
          test -f _site/assets/css/volunteer.css
          test -f _site/assets/js/auth.js
          test -f _site/assets/js/member.js
          test -f _site/assets/js/music.js
          test -f _site/assets/js/volunteer.js
          test -f _site/assets/data/music-library.json
          test -f _site/manifest.webmanifest
          test -f _site/service-worker.js
          test -f _site/admin.html
          test -f _site/reset-password.html
          test -f _site/community-guidelines.html
          test -f _site/volunteer.html
          test -f _site/ebooks/index.html
          test -f _site/music/index.html
          test -f _site/app/index.html
          test -f _site/app/app.css
          test -f _site/app/app.js
          test -f _site/app/access.js
          test -f _site/app/manifest.webmanifest
          test -f _site/app/install/index.html
          test -f _site/app/install/install.css
          test -f _site/app/install/install.js
          test -f _site/communityengagements/index.html
          test -f _site/aboutfmb/index.html
          test -f '_site/fmb&co/index.html'
          test -f '_site/fmb&co/senz/index.html'
          test -f '_site/fmb&co/cognita/index.html'
          test -f _site/fmbandco/index.html
          test -f _site/profile/index.html
          test -f _site/gethelp/index.html
          test -f _site/news/index.html
          test -f _site/news/cleopatra-barrera/index.html
          test -f _site/news/impeachment/index.html
          test -f _site/news/pax-silica/index.html
          test -f _site/news/good-news/index.html
          test -f _site/dress-with-intention.html
          test -f _site/assets/css/organized-pages.css
          test -f _site/assets/css/fmb-polish.css
          test -f _site/assets/css/fmbandco-brand.css
          test -f _site/assets/css/fmb-content.css
          test -f _site/assets/css/fmb-mobile-clean.css
          test -f _site/assets/images/projects/senz-logo.png
          test -f _site/assets/images/projects/cognita-logo.png
          test -f _site/assets/images/fmbandco/fmbandco-primary-transparent.png
          test -f _site/assets/images/projects/senz-logo-clean.png
          test -f _site/assets/images/projects/cognita-logo-clean.png
          test -f _site/assets/images/fmbandco/fmbandco-primary-clean.png
          test -f _site/assets/images/fmbandco/fmbandco-primary-reversed.png
          test -f _site/assets/images/fmbandco/fmbandco-ampersand-gold.png
          test -f _site/assets/images/fmbandco/francine-founder-hero-640.webp
          test -f _site/assets/images/fmbandco/francine-founder-hero-923.webp
          test -f _site/assets/fonts/great-vibes-latin-400-normal.woff2
          test -f _site/assets/fonts/Great-Vibes-OFL.txt
          test -f _site/assets/js/fmbandco-motion.js
          test -f _site/assets/images/news/cleopatra-barrera-zambales-ocean-feature.jpeg
          test -f _site/assets/images/news/sara-duterte-impeachment.webp
          test -f _site/assets/images/news/pax-silica-briefing.png
          test -f _site/assets/images/news/good-news-briefing.png
          test -f _site/assets/images/volunteer/francine-leading-with-love-fmb.webp
          test -f _site/assets/images/volunteer/francine-serving-with-volunteers.webp
          test -f _site/assets/images/volunteer/francine-and-volunteer-team.webp
          test -f _site/assets/images/volunteer/with-love-fmb-community-service.webp
          test -f _site/assets/images/app-icon-192.png
          test -f _site/assets/images/app-icon-512.png
          grep -q 'A community project created to help you' _site/index.html
          grep -q 'Every page has a clear purpose' _site/index.html
          grep -q 'Begin with a public guide' _site/index.html
          grep -q 'Create profile' _site/auth.html
          grep -q 'Four collections. Thirty-one tracks.' _site/music/index.html
          grep -q 'How are you, really?' _site/app/index.html
          grep -q 'id="appSignupForm"' _site/app/index.html
          grep -q 'Your calmer space, one tap away.' _site/index.html
          grep -q 'id="installNow"' _site/app/install/index.html
          grep -q 'beforeinstallprompt' _site/app/install/install.js
          grep -q 'signInWithPassword' _site/app/access.js
          grep -q "backgroundSize='contain'" _site/assets/js/music.js
          grep -q 'Founder, strategist, creative director, advocate' _site/aboutfmb/index.html
          grep -q 'Community Engagements - AMDG' _site/communityengagements/index.html
          grep -q 'Built to shape ideas into meaningful progress' '_site/fmb&co/index.html'
          grep -q 'SENZ Strategic Communications' '_site/fmb&co/senz/index.html'
          grep -q 'Cognita Institute of AI' '_site/fmb&co/cognita/index.html'
          grep -q -- '--fco-purple:#291744' _site/assets/css/fmbandco-brand.css
          grep -q '@keyframes fco-hero-rise' _site/assets/css/fmbandco-brand.css
          grep -q '@keyframes fco-portrait-float' _site/assets/css/fmbandco-brand.css
          grep -q 'francine-founder-hero-923.webp' '_site/fmb&co/index.html'
          grep -q 'fco-founder-signature' '_site/fmb&co/index.html'
          grep -q 'Francine Marie Bautista' '_site/fmb&co/index.html'
          grep -q 'great-vibes-latin-400-normal.woff2' '_site/fmb&co/index.html'
          grep -q '@font-face{font-family:"Great Vibes"' _site/assets/css/fmbandco-brand.css
          grep -q 'fmbandco-motion.js?v=20260718-motion-v1' '_site/fmb&co/index.html'
          grep -q 'fco-mobile-dock' '_site/fmb&co/index.html'
          grep -q 'id="checkinForm"' _site/profile/index.html
          grep -q 'Privacy Policy' _site/privacy-policy.html
          grep -q 'Your Body Is Worth Listening To' _site/womens-health.html
          grep -q 'Skin Care and Makeup Without the Pressure' _site/skin-care-makeup.html
          grep -q 'Coming Out, Being Known, and Learning to Respect' _site/coming-out-respect.html
          grep -q 'Men Can Cry' _site/men-can-cry.html
          grep -q 'FMB lens and disclaimer' _site/dress-with-intention.html
          grep -q 'National Center for Mental Health' _site/gethelp/index.html
          grep -q 'Pax Silica' _site/news/index.html
          grep -q 'Francine does not simply create visibility' _site/aboutfmb/index.html
          grep -q 'Community Engagements - AMDG' _site/communityengagements/index.html
          grep -q 'Good work should return as good' _site/index.html
          grep -q 'With love, FMB' _site/womens-health.html
          grep -q 'With love, FMB' _site/skin-care-makeup.html
          grep -q 'With love, FMB' _site/coming-out-respect.html
          grep -q 'With love, FMB' _site/men-can-cry.html
          grep -q 'fmb_saved_content_v1' _site/assets/js/site.js
          grep -q 'facebook.com/sharer/sharer.php' _site/assets/js/site.js
          grep -q 'data-share="messenger"' _site/assets/js/site.js
          grep -q 'Masinloc, Zambales 2211' _site/assets/js/site.js
          grep -q 'Republic of the Philippines' _site/assets/js/site.js
          grep -q '/assets/images/signature-transparent.png?v=20260716-footer-contrast' _site/assets/js/site.js
          grep -q 'body .footer:after' _site/assets/css/fmb-content.css
          grep -q 'setupMobileChrome' _site/assets/js/site.js
          grep -q 'item-action-row' _site/assets/js/site.js
          grep -q 'ebook-card-shell' _site/assets/js/site.js
          grep -q '@media(max-width:800px)' _site/assets/css/fmb-mobile-clean.css
          grep -q 'mobile-chrome-compact' _site/assets/css/fmb-mobile-clean.css
          grep -q 'The Golden Sash and the Bigger Dream' _site/news/index.html
          grep -q 'cleopatra-barrera-zambales-ocean-feature.jpeg' _site/news/cleopatra-barrera/index.html
          grep -q 'Photo: AP Photo/Basilio Sepe' _site/news/index.html
          grep -q 'sara-duterte-impeachment.webp' _site/news/impeachment/index.html
          grep -q 'pax-silica-briefing.png' _site/news/pax-silica/index.html
          grep -q 'good-news-briefing.png' _site/news/good-news/index.html

      - name: Publish directly to gh-pages
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd _site
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Publish current With love, FMB website"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
