name: Publish With love, FMB

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare the current website
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          cp index.html _site/index.html
          cp CNAME _site/CNAME
          cp -R assets _site/assets
          touch _site/.nojekyll

          test -f _site/index.html
          test -f _site/CNAME
          test "$(cat _site/CNAME)" = "www.francinemariebautista.com"
          test -f _site/assets/icon.svg
          test -f _site/assets/signature.svg
          test -f _site/assets/founder.svg
          test -f _site/assets/senz.svg
          test -f _site/assets/cognita.svg
          test -f _site/assets/mabayani.svg
          grep -q 'Built to be felt. Made to matter.' _site/index.html

      - name: Publish directly to gh-pages
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd _site
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Publish current With love, FMB website"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
