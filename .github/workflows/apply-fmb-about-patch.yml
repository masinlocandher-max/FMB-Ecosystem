name: Apply FMB About patch

on:
  push:
    branches:
      - fmb-about-editorial-remotion

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore verified website and Remotion files
        shell: bash
        run: |
          set -euo pipefail
          cat .fmb-patch/chunk-* | base64 --decode > /tmp/fmb-about-patch.tar.gz
          tar -xzf /tmp/fmb-about-patch.tar.gz -C .
          rm -rf .fmb-patch
          rm -f .github/workflows/apply-fmb-about-patch.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add responsive About FMB editorial page and Remotion source"
          git push origin HEAD:fmb-about-editorial-remotion
