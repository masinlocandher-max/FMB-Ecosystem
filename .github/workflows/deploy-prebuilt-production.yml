name: Deploy prebuilt production

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-prebuilt-production.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fmb-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Verify deployment credentials
        shell: bash
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing"
              missing=1
            fi
          done
          exit "$missing"
      - name: Install repository dependencies
        run: npm ci
      - name: Link production project
        run: npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build production output in GitHub
        run: npx --yes vercel@latest build --prod --token="$VERCEL_TOKEN"
      - name: Deploy prebuilt production output
        run: npx --yes vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
