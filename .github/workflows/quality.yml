name: Website quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate links, assets, HTML and JSON
        run: python scripts/quality_check.py
      - name: Validate JavaScript syntax
        run: |
          find . -type f -name '*.js' -not -path './.git/*' -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done
