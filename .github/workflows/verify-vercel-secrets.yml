name: Verify Vercel secrets

on:
  pull_request:
    paths:
      - '.github/workflows/verify-vercel-secrets.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm required Vercel secrets exist
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        shell: bash
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_PROJECT_ID VERCEL_ORG_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing"
              missing=1
            else
              echo "$name is configured"
            fi
          done
          exit "$missing"
