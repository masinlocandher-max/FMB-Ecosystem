name: Member readiness

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      require_open:
        description: Fail unless public registration is open
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check member JavaScript syntax
        run: |
          node --check assets/js/auth.js
          node --check assets/js/member.js
          node --check assets/js/admin.js
          node --check assets/js/registration-readiness.js
          node --check assets/js/membership-admin.js
          node --check scripts/check-member-readiness.mjs
      - name: Verify membership launch files
        run: |
          test -f auth.html
          test -f member.html
          test -f admin.html
          test -f supabase/schema.sql
          test -f supabase/migrations/20260712_membership_readiness.sql
          grep -q "get_membership_status" assets/js/registration-readiness.js
          grep -q "admin_set_membership_open" assets/js/membership-admin.js
          grep -q "registration_open boolean not null default false" supabase/migrations/20260712_membership_readiness.sql

  live-readiness:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check live Supabase membership service
        run: node scripts/check-member-readiness.mjs ${{ inputs.require_open && '--require-open' || '' }}
