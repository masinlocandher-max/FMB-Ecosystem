name: Member readiness

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/withlovefmb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check member JavaScript syntax
        run: |
          node --check assets/js/auth.js
          node --check assets/js/member.js
          node --check assets/js/admin.js
          node --check assets/js/registration-readiness.js
          node --check assets/js/membership-admin.js
          node --check assets/js/admin-login.js
          node --check assets/js/admin-activate.js
          node --check assets/js/live-hotfix.js
          node --check assets/js/news-channel.js
          node --check assets/js/yoni-experience.js
          node --check app/access.js
          node --check app/app.js
          node --check app/install/install.js
          node --check scripts/check-member-readiness.mjs
          node --check scripts/check-pwa.mjs
      - name: Verify membership pages
        run: |
          test -f auth.html
          test -f member.html
          test -f admin.html
          test -f admin-login.html
          test -f admin-activate.html
      - name: Verify Supabase membership migrations
        run: |
          test -f supabase/schema.sql
          test -f supabase/migrations/20260712_membership_readiness.sql
          test -f supabase/migrations/20260714_initial_admin_owner_claim.sql
          test -f supabase/migrations/20260718142219_complete_member_app_profile.sql
          test -f supabase/migrations/20260723123000_close_yoni_registration.sql
          grep -q "registration_open boolean not null default false" supabase/migrations/20260712_membership_readiness.sql
          grep -q "Owner email required" supabase/migrations/20260714_initial_admin_owner_claim.sql
          grep -q "interval '60 days'" supabase/migrations/20260718142219_complete_member_app_profile.sql
          grep -q "membership_settings_registration_closed" supabase/migrations/20260723123000_close_yoni_registration.sql
          grep -q "registration is closed and cannot be opened" supabase/migrations/20260723123000_close_yoni_registration.sql
      - name: Verify membership controls
        run: |
          grep -q "registrationOpen=false" assets/js/registration-readiness.js
          grep -q "get_membership_status" assets/js/membership-admin.js
          ! grep -q "admin_set_membership_open" assets/js/membership-admin.js
          grep -q "claim_initial_admin" assets/js/admin-activate.js
          grep -Eq "signInWithOtp|/auth/v1/otp" assets/js/admin-login.js
      - name: Verify install experience
        run: |
          test -f app/install/index.html
          test -f app/install/install.css
          test -f app/install/install.js
          grep -q 'id="installNow"' app/install/index.html
          grep -q 'beforeinstallprompt' app/install/install.js
          node scripts/check-pwa.mjs
      - name: Run personal website quality check
        run: python3 scripts/quality_check_current.py

  live-readiness:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/withlovefmb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check live Supabase membership service
        run: node scripts/check-member-readiness.mjs
