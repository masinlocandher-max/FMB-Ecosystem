name: Validate FMB ecosystem

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-static-sites:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify application folders and entry files
        run: |
          set -euo pipefail
          test -f apps/withlovefmb/index.html
          test -f apps/senz/index.html
          test -f apps/cognita/index.html
          test -f apps/cognita/package.json

      - name: Smoke test With Love FMB
        run: |
          set -euo pipefail
          python3 -m http.server 4171 --directory apps/withlovefmb >/tmp/fmb-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for i in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:4171/ >/tmp/fmb-home.html; then break; fi
            sleep 1
          done
          grep -qi '<html' /tmp/fmb-home.html
          grep -qi 'Francine Marie Bautista\|With love, FMB' /tmp/fmb-home.html

      - name: Smoke test SENZ
        run: |
          set -euo pipefail
          python3 -m http.server 4172 --directory apps/senz >/tmp/senz-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for i in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:4172/ >/tmp/senz-home.html; then break; fi
            sleep 1
          done
          grep -qi '<html' /tmp/senz-home.html
          grep -qi 'SENZ' /tmp/senz-home.html

  validate-cognita:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cognita
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/cognita/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Cognita
        run: npm run build

      - name: Smoke test Cognita build
        run: |
          set -euo pipefail
          test -f dist/index.html
          python3 -m http.server 4173 --directory dist >/tmp/cognita-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for i in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:4173/ >/tmp/cognita-home.html; then break; fi
            sleep 1
          done
          grep -qi '<html' /tmp/cognita-home.html
          grep -qi 'Cognita' /tmp/cognita-home.html

  validate-unified-vercel-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Vercel configuration JSON
        run: node -e "JSON.parse(require('node:fs').readFileSync('vercel.json', 'utf8'))"

      - name: Build complete ecosystem output
        run: npm run build

      - name: Verify combined output
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/_sites/senz/index.html
          test -f dist/_sites/cognita/index.html
          grep -qi 'Francine Marie Bautista\|With love, FMB' dist/index.html
          grep -qi 'SENZ' dist/_sites/senz/index.html
          grep -qi 'Cognita' dist/_sites/cognita/index.html

  inspect-backend-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Inventory backend references
        run: |
          set -euo pipefail
          echo 'SUPABASE REFERENCES'
          grep -RIn --exclude-dir=node_modules --exclude-dir=.git -E 'supabase|SUPABASE' apps | head -80 || true
          echo 'BASE44 REFERENCES'
          grep -RIn --exclude-dir=node_modules --exclude-dir=.git -E 'base44|BASE44' apps | head -80 || true

      - name: Print workflows requiring path repair
        run: |
          set -euo pipefail
          for workflow_name in 'Website quality' 'Member readiness'; do
            workflow=$(grep -rl --include='*.yml' --include='*.yaml' "^name: ${workflow_name}$" .github/workflows | head -1 || true)
            echo "WORKFLOW NAME: ${workflow_name}"
            echo "WORKFLOW FILE: ${workflow:-NOT FOUND}"
            if [ -n "$workflow" ]; then
              sed -n '1,220p' "$workflow"
            fi
          done
