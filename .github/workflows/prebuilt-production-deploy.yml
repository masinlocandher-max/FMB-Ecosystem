name: Prebuilt production deploy

# Manual or main-only fallback for the audited FMB ecosystem production release.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/prebuilt-production-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fmb-production-deploy
  cancel-in-progress: false

jobs:
  deploy-prebuilt:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify deployment credentials are present
        shell: bash
        run: |
          set -euo pipefail
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Link production project
        run: npx --yes vercel@56.5.0 pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build audited production output locally
        run: npx --yes vercel@56.5.0 build --prod --token="$VERCEL_TOKEN"
      - name: Upload prebuilt production release
        shell: bash
        run: |
          set -euo pipefail

          deploy_status=1
          for attempt in 1 2 3; do
            echo "Production upload attempt ${attempt} of 3"
            set +e
            npx --yes vercel@56.5.0 deploy --prebuilt --prod --token="$VERCEL_TOKEN" 2>&1 | tee deployment-url.txt
            deploy_status=${PIPESTATUS[0]}
            set -e

            if [ "$deploy_status" -eq 0 ]; then
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 30))
            fi
          done

          if [ "$deploy_status" -ne 0 ]; then
            exit "$deploy_status"
          fi

          production_url=$(grep -Eo 'https://[^[:space:]]+' deployment-url.txt | tail -n 1 || true)
          test -n "$production_url"
          printf '%s\n' "$production_url" > production-url.txt
      - name: Preserve deployment reference
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fmb-production-deployment-${{ github.run_id }}
          path: |
            deployment-url.txt
            production-url.txt
          if-no-files-found: warn
          retention-days: 7
